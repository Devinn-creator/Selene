<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Flow Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="backgroundLayer"></div>
  <div class="darkOverlay"></div>

  <!-- TOP LEFT GOAL -->
  <div class="goalArea">
    <input id="goalInput" type="text" placeholder="Enter your timer goal..." />
    <button id="setGoalBtn">Set</button>
  </div>

  <!-- TOP RIGHT CALENDAR -->
  <button id="calendarToggle" class="calendarToggle">Calendar</button>

  <div id="calendarPanel" class="calendarPanel hidden">
    <div class="calendarTop">
      <h2 id="monthTitle"></h2>
      <button id="closeCalendar">×</button>
    </div>

    <div class="weekdays">
      <span>Sun</span>
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
    </div>

    <div id="calendarGrid" class="calendarGrid"></div>
  </div>

  <!-- LEFT BACKGROUND SELECTOR -->
  <div class="backgroundControls">
    <button id="prevBackground">‹</button>
    <button id="nextBackground">›</button>
  </div>

  <!-- CENTER TIMER -->
  <main class="centerTimer">
    <h1 id="goalDisplay"></h1>

    <div class="timerInputBox">
      <button id="minusFive">−5</button>
      <input id="minuteInput" type="number" min="1" value="25" />
      <button id="plusFive">+5</button>
    </div>

    <div id="timerDisplay" class="timerDisplay">00:25:00</div>

    <div class="timerButtons">
      <button id="startTimer">Start</button>
      <button id="pauseTimer">Pause</button>
      <button id="resetTimer">Reset</button>
    </div>
  </main>

  <!-- BOTTOM LEFT QUOTE -->
  <div class="quoteBox">
    <p id="dailyQuote"></p>
  </div>

  <!-- BOTTOM SPOTIFY BAR -->
  <div class="spotifyBar">
    <iframe
      style="border-radius:16px"
      src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS?utm_source=generator"
      width="100%"
      height="80"
      frameborder="0"
      allowfullscreen=""
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>

  <script src="script.js"></script>
</body>
</html>
