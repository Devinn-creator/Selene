<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selene</title>

  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js" defer></script>
</head>

<body>
  <div class="app">
    <header>
      <h1>Selene</h1>
      <button id="sign-out-btn" class="ghost hidden">Sign Out</button>
    </header>

    <section id="auth-section" class="card auth-card">
      <h2>Welcome to Selene</h2>
      <p>Sign in to save your goals and calendar.</p>

      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />

      <div class="row">
        <button id="sign-in-btn">Sign In</button>
        <button id="sign-up-btn" class="secondary">Create Account</button>
      </div>

      <p id="auth-message" class="message"></p>
    </section>

    <main id="app-section" class="hidden">
      <section class="timer-card">
        <h2>Focus Timer</h2>

        <div id="timerDisplay">25:00</div>

        <div class="timer-controls">
          <button id="minusFive">-5</button>
          <input id="timerMinutes" type="number" value="25" min="1" />
          <button id="plusFive">+5</button>
        </div>

        <div class="row center">
          <button id="startTimer">Start</button>
          <button id="pauseTimer" class="secondary">Pause</button>
          <button id="resetTimer" class="ghost">Reset</button>
        </div>

        <div class="spotify">
          <iframe
            src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS?utm_source=generator"
            width="100%"
            height="152"
            frameborder="0"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
          </iframe>
        </div>
      </section>

      <section class="grid">
        <div class="card">
          <h2>Goals</h2>

          <div class="input-row">
            <input id="goal-input" placeholder="Add a goal..." />
            <button id="add-goal-btn">Add</button>
          </div>

          <ul id="goals-list"></ul>
        </div>

        <div class="card">
          <h2>Calendar Events</h2>

          <input id="event-title" placeholder="Event title" />
          <input id="event-date" type="date" />
          <textarea id="event-description" placeholder="Event description"></textarea>

          <button id="add-event-btn">Add Event</button>

          <ul id="events-list"></ul>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
