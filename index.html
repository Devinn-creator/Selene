<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FlowPlanner</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="bg"></div>

<header>
  <h1>FlowPlanner</h1>

  <div class="goal-row">
    <input id="goalInput" placeholder="Enter goal..." />
    <button id="setGoal">Add</button>
  </div>
</header>

<!-- TIMER CENTER -->
<div class="timer">
  <h2 id="goalDisplay"></h2>

  <div class="time-input">
    <button id="minus">−5</button>
    <input id="minutes" type="number" value="25">
    <button id="plus">+5</button>
  </div>

  <div id="time">00:25:00</div>

  <div class="controls">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
</div>

<!-- BACKGROUND -->
<div class="bg-controls">
  <button id="prev">‹</button>
  <button id="next">›</button>
</div>

<!-- CALENDAR -->
<div class="calendar">
  <div id="grid"></div>
</div>

<!-- SPOTIFY -->
<div class="spotify">
<iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS"
width="100%" height="80"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
