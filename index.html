<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="overlay"></div>

  <header>
    <div class="goal-box">
      <input id="goalInput" type="text" placeholder="What are you focusing on?" />
      <button id="saveGoalBtn">Set Goal</button>
    </div>

    <button id="calendarBtn" class="calendar-btn">Calendar</button>
  </header>

  <main>
    <button id="prevBg" class="bg-arrow left">‹</button>
    <button id="nextBg" class="bg-arrow right">›</button>

    <section class="timer-card">
      <p id="goalDisplay" class="goal-display"></p>

      <div class="time-picker">
        <button id="minusFive">−5</button>
        <input id="customMinutes" type="number" min="1" value="25" />
        <button id="plusFive">+5</button>
      </div>

      <div id="timerDisplay" class="timer-display">00:25:00</div>

      <div class="timer-buttons">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>
    </section>
  </main>

  <section id="calendarPanel" class="calendar-panel hidden">
    <div class="calendar-header">
      <h2 id="monthTitle"></h2>
      <button id="closeCalendar">×</button>
    </div>
    <div class="weekday-row">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div id="calendarGrid" class="calendar-grid"></div>
  </section>

  <section class="quote-box">
    <p id="dailyQuote"></p>
  </section>

  <section class="spotify-bar">
    <div>
      <strong>Lofi Focus Radio</strong>
      <p>Calm beats for deep work</p>
    </div>

    <div class="music-controls">
      <button>⏮</button>
      <button id="playBtn">▶</button>
      <button>⏭</button>
    </div>

    <input type="range" min="0" max="100" value="55" />
  </section>

  <audio id="audioPlayer" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_9460f7b4c2.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
