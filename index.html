<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selene</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <h1>Selene</h1>
    <button id="calendarBtn">Calendar</button>
  </header>

  <main class="timer-wrap">
    <input id="goalInput" placeholder="What are you focusing on?" />

    <h2 id="goalDisplay">Ready to focus?</h2>

    <div id="timerDisplay">25:00</div>

    <div class="time-row">
      <button id="minusFive">−5</button>
      <input id="minutesInput" type="number" min="1" value="25" />
      <button id="plusFive">+5</button>
    </div>

    <div class="button-row">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>
  </main>

  <section id="calendarPanel" class="calendar-panel hidden">
    <div class="calendar-head">
      <h2 id="monthTitle"></h2>
      <button id="closeCalendar">×</button>
    </div>

    <div id="calendarGrid" class="calendar-grid"></div>

    <div class="event-card">
      <h3 id="selectedDateTitle"></h3>
      <ul id="selectedEvents"></ul>
    </div>
  </section>

  <aside class="quote-box">
    <p id="quoteText"></p>
  </aside>

  <section class="spotify-box">
    <iframe
      src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS?utm_source=generator"
      width="100%"
      height="152"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </section>

  <script src="script.js"></script>
</body>
</html>
